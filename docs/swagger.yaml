  # V2 — BALANCE
  # ─────────────────────────────────────────

  /v2/balance/estimate/period:
    get:
      tags: [Balance V2]
      summary: Balanço estimado por período
      description: |
        Compara movimentações reais com estimativas de orçamento.
        - **Despesa:** usa o menor valor entre o real e o estimado (estimate como teto)
        - **Receita:** usa o maior valor entre o real e o estimado (estimate como piso)
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
            example: "2024-01-01"
        - name: to
          in: query
          schema:
            type: string
            format: date
            example: "2024-01-31"
      responses:
        "200":
          description: Balanço calculado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceOutput"
        "400":
          $ref: "#/components/responses/BadRequest"

  # ─────────────────────────────────────────
  # V2 — STATEMENTS
  # ─────────────────────────────────────────

  /v2/statements/extract:
    post:
      tags: [Statements V2]
      summary: Extrair movimentações de extrato bancário (via IA)
      description: |
        Recebe um arquivo de extrato (PDF ou imagem, máx. 10MB) e usa visão computacional
        para extrair as movimentações. Retorna os dados brutos para revisão antes de importar.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Arquivo do extrato (PDF, PNG, JPG — máx 10MB)
      responses:
        "200":
          description: Movimentações extraídas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatementExtractResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "413":
          description: Arquivo excede o tamanho máximo (10MB)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v2/statements/classify:
    post:
      tags: [Statements V2]
      summary: Classificar movimentações extraídas com sugestões de categoria
      description: |
        Recebe movimentações extraídas e retorna sugestões de categoria/subcategoria
        usando histórico de classificações anteriores e/ou IA.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatementClassifyInput"
      responses:
        "200":
          description: Sugestões de classificação
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatementClassifyResult"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v2/statements/confirm:
    post:
      tags: [Statements V2]
      summary: Confirmar e importar movimentações do extrato
      description: |
        Persiste as movimentações revisadas e classificadas. Movimentações duplicadas
        (mesmo hash de idempotência) são ignoradas automaticamente.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatementConfirmInput"
      responses:
        "200":
          description: Resultado da importação
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatementConfirmResult"
        "400":
          $ref: "#/components/responses/BadRequest"

