# ─────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────

components:

  securitySchemes:
    FirebaseAuth:
      type: apiKey
      in: header
      name: user_token
      description: Firebase ID Token obtido via autenticação Firebase
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: API key interna para rotas /jobs

  parameters:
    CouponID:
      name: id
      in: path
      required: true
      description: ID do cupom (string customizada, não necessariamente UUID)
      schema:
        type: string
        example: "BLACKFRIDAY2024"
    ResourceID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MovementID:
      name: id
      in: path
      required: true
      description: UUID da movimentação ou do recorrente (para movimentações virtuais não pagas)
      schema:
        type: string
        format: uuid
    UserIDPath:
      name: id
      in: path
      required: true
      description: Firebase User ID (string, não UUID)
      schema:
        type: string
        example: "uid_abc123"

  responses:
    BadRequest:
      description: Requisição inválida (parâmetros ou body malformado)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: 400
              message: "invalid input: invalid date format"
    Unauthorized:
      description: Token de autenticação ausente ou inválido
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: 401
              message: "unauthorized"
    NotFound:
      description: Recurso não encontrado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: 404
              message: "not found"
    Conflict:
      description: Conflito — recurso já existe ou duplicado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: 409
              message: "conflict: resource already exists"
    Forbidden:
      description: Acesso negado — role insuficiente
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "forbidden: admin role required"
    InternalServerError:
      description: Erro interno do servidor
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: 500
              message: "internal server error"
    UnprocessableEntity:
      description: Entidade não processável (ex. saldo insuficiente, limite de plano atingido)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            insufficient_balance:
              value:
                error:
                  code: 422
                  message: "wallet insufficient balance"
            plan_limit:
              value:
                error:
                  code: 422
                  message: "wallet limit reached for current plan"

  schemas:

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: integer
              example: 400
            message:
              type: string
              example: "invalid input: description is required"

    # ── MOVEMENT ────────────────────────────

    CreditCardInfo:
      type: object
      properties:
        invoice_id:
          type: string
          format: uuid
          nullable: true
        credit_card_id:
          type: string
          format: uuid
          nullable: true
        installment_group_id:
          type: string
          format: uuid
          nullable: true
        installment_number:
          type: integer
          nullable: true
        total_installments:
          type: integer
          nullable: true

    MovementInput:
      type: object
      required: [description, amount, date]
      properties:
        id:
          type: string
          format: uuid
          nullable: true
        description:
          type: string
          example: "Supermercado"
        amount:
          type: number
          format: double
          example: -150.50
          description: Negativo para despesas, positivo para receitas
        date:
          type: string
          format: date-time
          example: "2024-01-15T00:00:00Z"
        is_paid:
          type: boolean
          default: false
        is_recurrent:
          type: boolean
          default: false
        recurrent_id:
          type: string
          format: uuid
          nullable: true
        pair_id:
          type: string
          format: uuid
          nullable: true
          description: ID de par para transferências
        credit_card_info:
          $ref: "#/components/schemas/CreditCardInfo"
          nullable: true
        wallet_id:
          type: string
          format: uuid
          nullable: true
        type_payment:
          type: string
          example: "debit"
          enum: [debit, credit, pix, cash, ted, doc]
        category_id:
          type: string
          format: uuid
          nullable: true
        sub_category_id:
          type: string
          format: uuid
          nullable: true

    WalletSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
          nullable: true
        description:
          type: string
        balance:
          type: number
          format: double
        initial_balance:
          type: number
          format: double
        initial_date:
          type: string
          format: date-time
          nullable: true

    CategorySummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
          nullable: true
        description:
          type: string
        color:
          type: string
        is_income:
          type: boolean
        sub_categories:
          type: array
          items:
            $ref: "#/components/schemas/SubCategoryOutput"

    SubCategoryOutput:
      type: object
      properties:
        id:
          type: string
          format: uuid
          nullable: true
        description:
          type: string

    MovementOutput:
      type: object
      properties:
        id:
          type: string
          format: uuid
          nullable: true
        description:
          type: string
        amount:
          type: number
          format: double
        date:
          type: string
          format: date-time
          nullable: true
        is_paid:
          type: boolean
        is_recurrent:
          type: boolean
        recurrent_id:
          type: string
          format: uuid
          nullable: true
        pair_id:
          type: string
          format: uuid
          nullable: true
        credit_card_info:
          $ref: "#/components/schemas/CreditCardInfo"
          nullable: true
        wallet:
