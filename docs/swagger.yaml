          type: string
          description: ID da assinatura no MercadoPago (apenas quando aplicável)
          example: "2c93808459c6a000015a8e8c50010b1a"
        limits:
          $ref: "#/components/schemas/PlanLimits"
        usage:
          $ref: "#/components/schemas/LimitsUsage"
        reset_at:
          type: string
          format: date-time
          description: Data de reset dos contadores mensais (primeiro dia do próximo mês)
          example: "2024-02-01T00:00:00Z"

    DeleteAccountRequest:
      type: object
      required: [confirm]
      properties:
        confirm:
          type: boolean
          description: Deve ser `true` para confirmar a exclusão permanente da conta
          example: true

    UserConsentRequest:
      type: object
      required: [term_version]
      properties:
        term_version:
          type: string
          description: Versão dos termos que o usuário está aceitando
          example: "v1.2"

    UserConsentResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        term_version:
          type: string
          example: "v1.2"
        agreed_at:
          type: string
          format: date-time
        ip_address:
          type: string
          example: "192.168.1.1"
        user_agent:
