        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /v2/movements/{id}/revert-pay:
    post:
      tags: [Movements V2]
      summary: Reverter pagamento de movimentação
      parameters:
        - $ref: "#/components/parameters/MovementID"
      responses:
        "200":
          description: Pagamento revertido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovementOutput"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /v2/movements/{id}:
    put:
      tags: [Movements V2]
      summary: Editar apenas esta movimentação (UpdateOne)
      description: |
        Para movimentações recorrentes, cria um fork na chain — somente esta ocorrência é alterada.
        Se a movimentação estiver paga e o valor ou carteira mudar, o balanço da carteira é reconciliado.
      parameters:
        - $ref: "#/components/parameters/MovementID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MovementInput"
      responses:
        "200":
          description: Movimentação atualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovementOutput"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Movements V2]
      summary: Deletar apenas esta movimentação (DeleteOne)
      description: |
        Para recorrentes: divide a chain — as ocorrências posteriores continuam existindo.
        Se a movimentação estiver paga, o balanço da carteira é revertido.
        Se o ID não corresponder a um movimento físico (movimentação virtual não paga), o sistema busca pelo recurrent_id.
      parameters:
        - $ref: "#/components/parameters/MovementID"
        - name: date
          in: query
          description: Mês/ano da ocorrência a deletar (YYYY-MM-DD). Obrigatório para recorrentes.
          schema:
            type: string
            format: date
      responses:
        "204":
          description: Movimentação deletada
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /v2/movements/{id}/all-next:
    put:
      tags: [Movements V2]
      summary: Editar esta e todas as próximas ocorrências (UpdateAllNext)
      description: |
        Cria um fork na chain recorrente: encerra a chain original neste mês e cria uma nova chain
        com os novos parâmetros a partir deste mês. Ocorrências anteriores não são afetadas.
      parameters:
        - $ref: "#/components/parameters/MovementID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MovementInput"
      responses:
        "200":
          description: Chain recorrente bifurcada e movimentação atualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovementOutput"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Movements V2]
      summary: Deletar esta e todas as próximas ocorrências (DeleteAllNext)
      description: |
        Para recorrentes: trunca a chain neste mês. As ocorrências anteriores são mantidas.
        Para recorrente de mês único: deleta a chain inteiramente.
        Se pago, reverte o balanço da carteira.
      parameters:
        - $ref: "#/components/parameters/MovementID"
        - name: date
          in: query
          description: Mês/ano a partir do qual deletar (YYYY-MM-DD).
          schema:
            type: string
            format: date
      responses:
        "204":
          description: Ocorrências deletadas
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

