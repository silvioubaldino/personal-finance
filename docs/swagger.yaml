openapi: 3.0.3
info:
  title: Personal Finance API
  description: |
    API de finanças pessoais com suporte a movimentações, cartões de crédito, faturas, carteiras, categorias, estimativas e extrato bancário.

    ## Autenticação
    Todos os endpoints (exceto `/ping`, `/subscription/plan`, `/subscription/return` e webhooks públicos) requerem um Firebase ID Token no header `user_token`.
    Endpoints sob `/jobs` requerem uma API key interna no header `x-api-key`.

    ## Versionamento
    - **V2 (Clean Architecture):** prefixo `/v2/` — versão atual, recomendada
    - **V1 (Legacy):** sem prefixo — mantida para retrocompatibilidade
  version: "2.0.0"
  contact:
    name: silvioubaldino

servers:
  - url: http://localhost:8080
    description: Local

security:
  - FirebaseAuth: []

tags:
  - name: Movements V2
    description: Movimentações financeiras (clean arch)
  - name: Categories V2
    description: Categorias (clean arch)
  - name: SubCategories V2
    description: Subcategorias (clean arch)
  - name: Wallets V2
    description: Carteiras (clean arch)
  - name: CreditCards V2
    description: Cartões de crédito (clean arch)
  - name: Invoices V2
    description: Faturas de cartão (clean arch)
  - name: Transfers V2
    description: Transferências entre carteiras (clean arch)
  - name: Estimates V2
    description: Estimativas de orçamento (clean arch)
  - name: Balance V2
    description: Balanço estimado por período (clean arch)
  - name: Statements V2
    description: Extrato bancário — extração e importação via IA (clean arch)
  - name: Movements V1 (Legacy)
    description: Movimentações — versão legada
  - name: Categories V1 (Legacy)
    description: Categorias — versão legada
  - name: SubCategories V1 (Legacy)
    description: Subcategorias — versão legada
  - name: Wallets V1 (Legacy)
    description: Carteiras — versão legada
  - name: Estimates V1 (Legacy)
    description: Estimativas — versão legada
  - name: Balance V1 (Legacy)
    description: Balanço — versão legada
  - name: Coupons Admin
    description: Gerenciamento de cupons — requer Firebase token com role admin
  - name: Coupons Public
    description: Preview de cupons para usuários autenticados (Firebase token)
  - name: Subscription Plans
    description: Planos de assinatura disponíveis (público)
  - name: Subscriptions Me
    description: Assinatura do usuário autenticado
  - name: Webhooks
    description: Webhooks de pagamento (público, sem autenticação)
  - name: Jobs
    description: Operações internas — protegidas por API key (header x-api-key)
  - name: Admin Users
    description: Gerenciamento de usuários e planos — requer role admin
  - name: Admin Subscriptions
    description: Gerenciamento e visibilidade de assinaturas — requer role admin
  - name: Me
    description: Preferências, limites, exportação e conta do usuário autenticado
  - name: Devices
    description: Dispositivos para push notifications
  - name: Agent
    description: Agente de finanças pessoais com IA (chat, memórias, conversas)
  - name: Health
    description: Health check

paths:

  # ─────────────────────────────────────────
  # HEALTH
  # ─────────────────────────────────────────

  /ping:
    get:
      tags: [Health]
      summary: Health check
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: string
                example: pong

  # ─────────────────────────────────────────
  # SUBSCRIPTION PLANS (public)
  # ─────────────────────────────────────────

  /subscription/plan:
    get:
      tags: [Subscription Plans]
      summary: Listar planos de assinatura ativos
      security: []
      responses:
        "200":
          description: Lista de planos ativos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubscriptionPlanOutput"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /subscription/return:
    get:
      tags: [Subscription Plans]
      summary: Redirect pós-checkout (MercadoPago)
      description: |
        Endpoint público usado pelo MercadoPago para redirecionar o usuário após o checkout.
        Redireciona para o deeplink configurado em `MERCADOPAGO_APP_DEEPLINK`.
      security: []
      responses:
        "302":
          description: Redirecionamento para o app
        "404":
          description: Deeplink não configurado

  # ─────────────────────────────────────────
  # WEBHOOKS (public)
  # ─────────────────────────────────────────

  /webhooks/mercadopago:
    post:
      tags: [Webhooks]
      summary: Webhook MercadoPago
      description: Recebe notificações de pagamento do MercadoPago. Validado via headers x-signature e x-request-id.
      security: []
      parameters:
        - name: x-signature
          in: header
          schema:
            type: string
        - name: x-request-id
          in: header
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Payload do webhook conforme documentação MercadoPago
      responses:
        "200":
          description: Webhook processado

  /webhooks/revenuecat:
    post:
      tags: [Webhooks]
      summary: Webhook RevenueCat
      description: Recebe notificações de eventos de assinatura do RevenueCat. Validado via header Authorization.
      security: []
      parameters:
        - name: Authorization
          in: header
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Payload do webhook conforme documentação RevenueCat
      responses:
        "200":
          description: Webhook processado

  # ─────────────────────────────────────────
  # JOBS (internal, API key protected)
  # ─────────────────────────────────────────

  /jobs/push-notifications:
    post:
      tags: [Jobs]
      summary: Enviar push notifications de movimentações não pagas
      description: Job interno que envia notificações diárias de movimentações pendentes. Requer header x-api-key.
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Job executado
        "401":
          $ref: "#/components/responses/Unauthorized"

  /jobs/agent/purge-memories:
    post:
      tags: [Jobs]
      summary: Purgar memórias expiradas do agente
      description: Job interno que remove memórias de agente com `expires_at` no passado. Requer header x-api-key.
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Memórias purgadas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentPurgeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /jobs/agent/purge-conversations:
    post:
      tags: [Jobs]
      summary: Purgar conversas expiradas do agente
      description: Job interno que remove conversas com `expires_at` no passado. Requer header x-api-key.
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Conversas purgadas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentPurgeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─────────────────────────────────────────
  # ADMIN — USERS
  # ─────────────────────────────────────────

  /admin/users/{id}/claims:
    get:
      tags: [Admin Users]
      summary: Buscar claims do usuário
      description: Requer Firebase token com role `admin`.
      parameters:
        - $ref: "#/components/parameters/UserIDPath"
      responses:
        "200":
          description: Claims do usuário
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserClaimsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/users/{id}/plan:
    put:
      tags: [Admin Users]
      summary: Definir plano do usuário
      description: Requer Firebase token com role `admin`.
      parameters:
        - $ref: "#/components/parameters/UserIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetPlanRequest"
      responses:
        "200":
          description: Plano atualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "plan updated successfully"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/users/{id}/role:
    put:
      tags: [Admin Users]
      summary: Definir role do usuário
      description: Requer Firebase token com role `admin`.
      parameters:
        - $ref: "#/components/parameters/UserIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetRoleRequest"
      responses:
        "200":
          description: Role atualizada
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "role updated successfully"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ─────────────────────────────────────────
  # ADMIN — SUBSCRIPTION PLANS & SUBSCRIPTIONS
  # ─────────────────────────────────────────

  /admin/subscription-plans:
    post:
      tags: [Admin Subscriptions]
      summary: Criar plano de assinatura
      description: Requer Firebase token com role `admin`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlanRequest"
      responses:
        "201":
          description: Plano criado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "plan created successfully"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/subscriptions:
    get:
      tags: [Admin Subscriptions]
      summary: Resumo de assinaturas
      description: Requer Firebase token com role `admin`.
      parameters:
        - name: status
          in: query
          description: Filtrar por status (active, cancelled, etc.)
          schema:
            type: string
            example: "active"
        - name: source
          in: query
          description: Filtrar por origem (mercadopago, revenuecat, etc.)
          schema:
            type: string
            example: "mercadopago"
      responses:
        "200":
          description: Resumo de assinaturas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionsSummaryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ─────────────────────────────────────────
  # ADMIN — COUPONS
  # ─────────────────────────────────────────

  /admin/coupons:
    post:
      tags: [Coupons Admin]
      summary: Criar cupom
      description: Requer Firebase token com role `admin`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCouponRequest"
      responses:
        "201":
          description: Cupom criado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "coupon created successfully"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    get:
      tags: [Coupons Admin]
      summary: Listar cupons
      description: Requer Firebase token com role `admin`.
      parameters:
        - name: active
          in: query
          description: Se `true`, retorna apenas cupons ativos
          schema:
            type: boolean
            example: true
      responses:
        "200":
          description: Lista de cupons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CouponOutput"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/coupons/{id}:
    get:
      tags: [Coupons Admin]
      summary: Buscar cupom por ID
      description: Requer Firebase token com role `admin`.
      parameters:
        - $ref: "#/components/parameters/CouponID"
      responses:
        "200":
          description: Cupom encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CouponOutput"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Coupons Admin]
      summary: Atualizar cupom
      description: Requer Firebase token com role `admin`. Busca o cupom atual pelo ID e sobrescreve os campos editáveis.
      parameters:
        - $ref: "#/components/parameters/CouponID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCouponRequest"
      responses:
        "200":
          description: Cupom atualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "coupon updated successfully"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Coupons Admin]
      summary: Desativar cupom
      description: Requer Firebase token com role `admin`. Marca o cupom como inativo (soft delete).
      parameters:
        - $ref: "#/components/parameters/CouponID"
      responses:
        "200":
          description: Cupom desativado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "coupon deactivated"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─────────────────────────────────────────
  # ME — USER PREFERENCES & ACCOUNT
  # ─────────────────────────────────────────

  /me/preferences:
    get:
      tags: [Me]
      summary: Buscar preferências do usuário
      responses:
        "200":
          description: Preferências do usuário
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferencesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      tags: [Me]
      summary: Atualizar preferências do usuário
      description: Pelo menos um campo (language ou currency) deve ser informado.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPreferencesRequest"
      responses:
        "200":
          description: Preferências atualizadas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferencesResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/limits:
    get:
      tags: [Me]
      summary: Buscar limites e uso do plano atual
      responses:
        "200":
          description: Limites e uso do plano
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LimitsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/export:
    get:
      tags: [Me]
      summary: Exportar todos os dados do usuário
      description: Retorna um arquivo JSON com todos os dados do usuário (carteiras, movimentações, categorias, etc.).
      responses:
        "200":
          description: Dados exportados (download JSON)
          headers:
            Content-Disposition:
              schema:
                type: string
                example: "attachment; filename=user_data_export.json"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDataExport"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/account:
    delete:
      tags: [Me]
      summary: Deletar conta do usuário
      description: |
        Exclui permanentemente a conta e todos os dados associados.
        Requer confirmação explícita no body (`confirm: true`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteAccountRequest"
      responses:
        "200":
          description: Conta deletada
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Account and all associated data have been permanently deleted"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─────────────────────────────────────────
  # ME — SUBSCRIPTION
  # ─────────────────────────────────────────

  /me/subscription/checkout:
    post:
      tags: [Subscriptions Me]
      summary: Criar sessão de checkout de assinatura
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckoutRequest"
      responses:
        "200":
          description: URL de checkout
          content:
            application/json:
              schema:
                type: string
                description: URL de checkout do MercadoPago
                example: "https://www.mercadopago.com.br/subscriptions/checkout?preapproval_plan_id=..."
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /me/subscription/cancel:
    post:
      tags: [Subscriptions Me]
      summary: Cancelar assinatura do usuário
      responses:
        "200":
          description: Assinatura cancelada
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ─────────────────────────────────────────
  # ME — CONSENTS
  # ─────────────────────────────────────────

  /me/consents:
    post:
      tags: [Me]
      summary: Registrar consentimento do usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserConsentRequest"
      responses:
        "201":
          description: Consentimento registrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserConsentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    get:
      tags: [Me]
      summary: Listar todos os consentimentos do usuário
      responses:
        "200":
          description: Lista de consentimentos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserConsentResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/consents/check:
    get:
      tags: [Me]
      summary: Verificar se o usuário consentiu com uma versão dos termos
      parameters:
        - name: term_version
          in: query
          required: true
          schema:
            type: string
            example: "v1.2"
      responses:
        "200":
          description: Resultado da verificação
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentCheckResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/consents/{id}:
    get:
      tags: [Me]
      summary: Buscar consentimento por ID
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Consentimento encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserConsentResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─────────────────────────────────────────
  # DEVICES
  # ─────────────────────────────────────────

  /devices:
    post:
      tags: [Devices]
      summary: Registrar ou atualizar dispositivo (upsert)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceRequest"
      responses:
        "200":
          description: Dispositivo registrado/atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    get:
      tags: [Devices]
      summary: Listar dispositivos do usuário
      responses:
        "200":
          description: Lista de dispositivos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeviceResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /devices/{token}:
    delete:
      tags: [Devices]
      summary: Remover dispositivo pelo token
      parameters:
        - name: token
          in: path
          required: true
          description: Expo push token do dispositivo
          schema:
            type: string
            example: "ExponentPushToken[xxxxxxxxxxxxxxxxxxxx]"
      responses:
        "204":
          description: Dispositivo removido
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─────────────────────────────────────────
  # AGENT
  # ─────────────────────────────────────────

  /agent/chat:
    post:
      tags: [Agent]
      summary: Enviar mensagem ao agente de finanças
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentChatRequest"
      responses:
        "200":
          description: Resposta do agente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentChatResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /agent/conversations:
    get:
      tags: [Agent]
      summary: Listar conversas do usuário
      responses:
        "200":
          description: Lista de conversas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentConversation"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /agent/conversations/{id}:
    get:
      tags: [Agent]
      summary: Buscar conversa por ID (com mensagens)
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Conversa encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentConversation"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /agent/memories:
    post:
      tags: [Agent]
      summary: Salvar memória do agente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentSaveMemoryRequest"
      responses:
        "201":
          description: Memória salva
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentMemory"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    get:
      tags: [Agent]
      summary: Buscar memórias do agente
      parameters:
        - name: q
          in: query
          description: Texto para busca no conteúdo das memórias
          schema:
            type: string
            example: "meta de poupança"
      responses:
        "200":
          description: Lista de memórias
          content:
            application/json:
              schema:
