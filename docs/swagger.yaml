      properties:
        category_id:
          type: string
          format: uuid
        month:
          type: integer
          minimum: 1
          maximum: 12
          example: 1
        year:
          type: integer
          example: 2024
        amount:
          type: number
          format: double
          example: 800.00

    EstimateCategories:
      type: object
      properties:
        id:
          type: string
          format: uuid
        category_id:
          type: string
          format: uuid
        category_name:
          type: string
        is_category_income:
          type: boolean
        month:
          type: integer
        year:
          type: integer
        amount:
          type: number
          format: double

    EstimateSubCategoryInput:
      type: object
      required: [sub_category_id, estimate_category_id, month, year, amount]
      properties:
        sub_category_id:
          type: string
          format: uuid
        estimate_category_id:
          type: string
          format: uuid
        month:
          type: integer
          minimum: 1
          maximum: 12
        year:
          type: integer
        amount:
          type: number
          format: double

    EstimateSubCategories:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sub_category_id:
          type: string
          format: uuid
        sub_category_name:
          type: string
        estimate_category_id:
          type: string
          format: uuid
        month:
          type: integer
        year:
          type: integer
        amount:
          type: number
          format: double

    EstimateAmountUpdate:
      type: object
      required: [amount]
      properties:
        amount:
          type: number
          format: double
          example: 1200.00

    # ── BALANCE ──────────────────────────────

    BalanceOutput:
      type: object
      properties:
        expense:
          type: number
          format: double
          description: Total de despesas no período (min entre real e estimado por categoria)
        income:
          type: number
          format: double
          description: Total de receitas no período (max entre real e estimado por categoria)
        period_balance:
          type: number
          format: double
          description: income - expense

    # ── STATEMENT ────────────────────────────

    ExtractedMovement:
      type: object
      properties:
        date:
          type: string
          format: date
          example: "2024-01-15"
        description:
          type: string
          example: "MERCADO LIVRE"
        amount:
          type: number
          format: double
          example: -89.90
        recurrence_id:
          type: string
          format: uuid
          nullable: true
        category_id:
          type: string
          format: uuid
          nullable: true
        sub_category_id:
          type: string
          format: uuid
          nullable: true

    StatementExtractResult:
      type: object
      properties:
        movements:
          type: array
          items:
            $ref: "#/components/schemas/ExtractedMovement"
        errors:
          type: array
          items:
            type: string
          description: Linhas/itens que não puderam ser extraídos

    StatementClassifyInput:
      type: object
      required: [movements]
      properties:
        movements:
          type: array
          items:
            $ref: "#/components/schemas/ExtractedMovement"

    CategorySuggestion:
      type: object
      properties:
        description:
          type: string
        category_id:
          type: string
          format: uuid
        subcategory_id:
          type: string
          format: uuid
          nullable: true
        confidence:
          type: number
          format: double
          minimum: 0
          maximum: 1
        source:
          type: string
          enum: [history, ai]
          description: "`history` — baseado em classificações anteriores; `ai` — sugestão da IA"

    StatementClassifyResult:
      type: object
      properties:
        suggestions:
          type: array
          items:
            $ref: "#/components/schemas/CategorySuggestion"

    StatementConfirmInput:
      type: object
      required: [movements, wallet_id]
      properties:
        movements:
          type: array
          items:
            $ref: "#/components/schemas/ExtractedMovement"
        wallet_id:
          type: string
          format: uuid

    StatementConfirmResult:
      type: object
      properties:
        created:
          type: integer
          description: Quantidade de movimentações importadas
        skipped:
          type: integer
          description: Quantidade ignoradas por duplicidade (hash idempotente)
        errors:
          type: array
          items:
            type: string
          description: Mensagens de erro para movimentações que falharam

    # ── COUPON ───────────────────────────────

    CreateCouponRequest:
      type: object
      required: [id, code, discount_type, discount_value, valid_from, valid_until]
      properties:
        id:
          type: string
          description: ID customizado do cupom
          example: "BLACKFRIDAY2024"
        code:
          type: string
          description: Código que o usuário digita
          example: "BLACK20"
        description:
          type: string
          example: "20% de desconto Black Friday"
        discount_type:
          type: string
          enum: [percentage, fixed_amount]
          example: "percentage"
        discount_value:
          type: number
          format: double
          minimum: 0.01
          example: 20.0
          description: Percentual (ex. 20 = 20%) ou valor fixo em moeda, dependendo de `discount_type`
        valid_from:
          type: string
          format: date-time
          example: "2024-11-01T00:00:00Z"
        valid_until:
          type: string
          format: date-time
          example: "2024-11-30T23:59:59Z"
        max_redemptions:
          type: integer
          nullable: true
          example: 100
          description: Limite total de resgates. `null` = ilimitado.
        applicable_plan_ids:
          type: array
          items:
            type: string
          example: ["plan_pro", "plan_premium"]
          description: IDs dos planos elegíveis. Array vazio = aplica a todos os planos.
        is_active:
          type: boolean
          default: false

    UpdateCouponRequest:
      type: object
      required: [discount_type, discount_value, valid_from, valid_until]
      properties:
        description:
          type: string
          example: "20% de desconto Black Friday — atualizado"
        discount_type:
          type: string
          enum: [percentage, fixed_amount]
          example: "percentage"
        discount_value:
          type: number
          format: double
          minimum: 0.01
          example: 20.0
        valid_from:
          type: string
          format: date-time
          example: "2024-11-01T00:00:00Z"
        valid_until:
          type: string
          format: date-time
          example: "2024-11-30T23:59:59Z"
        max_redemptions:
          type: integer
          nullable: true
          example: 200
        applicable_plan_ids:
          type: array
          items:
            type: string
          example: ["plan_pro"]
        is_active:
          type: boolean

    CouponOutput:
      type: object
      properties:
        ID:
          type: string
          example: "BLACKFRIDAY2024"
        Code:
          type: string
          example: "BLACK20"
        Description:
          type: string
          example: "20% de desconto Black Friday"
        DiscountType:
          type: string
          enum: [percentage, fixed_amount]
          example: "percentage"
        DiscountValue:
          type: number
          format: double
          example: 20.0
        ValidFrom:
          type: string
          format: date-time
          example: "2024-11-01T00:00:00Z"
        ValidUntil:
          type: string
          format: date-time
          example: "2024-11-30T23:59:59Z"
        MaxRedemptions:
          type: integer
          nullable: true
          example: 100
        RedemptionCount:
          type: integer
          example: 42
        ApplicablePlanIDs:
          type: array
          items:
            type: string
          example: ["plan_pro", "plan_premium"]
        IsActive:
          type: boolean
          example: true
        CreatedAt:
          type: string
          format: date-time
        UpdatedAt:
          type: string
          format: date-time

    CouponPreviewRequest:
      type: object
      required: [plan_id, code]
      properties:
        plan_id:
          type: string
          description: ID do plano de assinatura
          example: "plan_pro"
        code:
          type: string
          description: Código do cupom a ser validado
          example: "BLACK20"

    CouponPreviewResponse:
      type: object
      properties:
        valid:
          type: boolean
          description: Indica se o cupom é válido para o plano e usuário informados
          example: true
        reason:
          type: string
          description: |
            Presente apenas quando `valid` é `false`. Possíveis valores:
            - `coupon not found`
            - `coupon is not active`
            - `coupon outside validity window`
            - `coupon redemption limit reached`
            - `user already redeemed this coupon`
            - `coupon does not apply to this plan`
            - `coupon would result in non-positive price`
            - `plan not found`
          example: "coupon is not active"
        original_price:
          type: number
          format: double
          description: Preço original do plano (presente quando o plano foi encontrado)
          example: 49.90
        discounted_price:
          type: number
          format: double
          description: Preço após desconto (presente apenas quando `valid` é `true`)
          example: 39.92
        currency:
          type: string
          description: Moeda do plano (presente quando o plano foi encontrado)
          example: "BRL"

    # ── SUBSCRIPTION PLANS ───────────────────

    SubscriptionPlanOutput:
      type: object
      properties:
        id:
          type: string
          example: "plan_pro"
        name:
          type: string
          example: "Pro"
        price:
          type: number
          format: double
          example: 49.90
        currency:
          type: string
          example: "BRL"
        frequency:
          type: integer
          description: Número de unidades de frequência (ex. 1 para mensal)
          example: 1
        frequency_type:
          type: string
          description: Tipo de frequência (months, years, etc.)
          example: "months"
        is_active:
          type: boolean
          example: true

    # ── SUBSCRIPTION (ME) ────────────────────

    CreateCheckoutRequest:
      type: object
      required: [plan_id]
      properties:
        plan_id:
          type: string
          description: ID do plano de assinatura
          example: "plan_pro"
        back_url:
          type: string
          description: URL de retorno após o checkout (deep link ou URL web)
          example: "myapp://subscription/result"
        coupon_code:
          type: string
          description: Código de cupom para desconto
          example: "BLACK20"

    # ── ADMIN ────────────────────────────────

    SetPlanRequest:
      type: object
      required: [plan]
      properties:
        plan:
          type: string
          description: Identificador do plano
          example: "pro"
        plan_expires_at:
          type: string
          format: date-time
          nullable: true
          description: Data de expiração do plano. `null` = sem expiração.
          example: "2025-12-31T23:59:59Z"

    SetRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          description: Role do usuário
          example: "admin"
          enum: [admin, user]

    UserClaimsResponse:
      type: object
      properties:
        user_id:
          type: string
          example: "uid_abc123"
        plan:
          type: string
          example: "pro"
        role:
          type: string
          example: "user"
        plan_expires_at:
          type: string
          format: date-time
          example: "2025-12-31T23:59:59Z"

    CreatePlanRequest:
      type: object
      required: [id, name, price, frequency, frequency_type]
      properties:
        id:
          type: string
          example: "plan_pro"
        name:
          type: string
          example: "Pro"
        price:
          type: number
          format: double
          minimum: 0.01
          example: 49.90
        currency:
          type: string
          example: "BRL"
        frequency:
          type: integer
          minimum: 1
          example: 1
        frequency_type:
          type: string
          example: "months"
        is_active:
          type: boolean
          default: false

    SubscriptionsSummaryResponse:
      type: object
      properties:
        summary:
          type: object
          properties:
            total_subscriptions:
              type: integer
              example: 150
            active_subscriptions:
              type: integer
              example: 120
            by_source:
              type: object
              additionalProperties:
                type: integer
              example:
                mercadopago: 80
                revenuecat: 40
            by_status:
              type: object
              additionalProperties:
                type: integer
              example:
                active: 120
                cancelled: 30
            active_revenue_by_currency:
              type: object
              additionalProperties:
                type: number
                format: double
              example:
                BRL: 5988.00
                USD: 99.90

    # ── ME ───────────────────────────────────

    UserPreferencesRequest:
      type: object
      properties:
        language:
          type: string
          description: Código de idioma (ex. pt-BR, en-US)
          example: "pt-BR"
        currency:
          type: string
          description: Código de moeda (ex. BRL, USD)
          example: "BRL"

    UserPreferencesResponse:
      type: object
      properties:
        language:
          type: string
          example: "pt-BR"
        currency:
          type: string
          example: "BRL"

    PlanLimits:
      type: object
      properties:
        wallets:
          type: integer
          example: 2
        credit_cards:
          type: integer
          example: 1
        movements_per_month:
          type: integer
          example: 50
        recurrences_per_month:
          type: integer
          example: 3

    LimitsUsage:
      type: object
      properties:
        wallets:
          type: integer
          example: 1
        credit_cards:
          type: integer
          example: 0
        movements_per_month:
          type: integer
          example: 23
        recurrences_per_month:
          type: integer
          example: 2

    LimitsResponse:
      type: object
