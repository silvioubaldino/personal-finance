          format: uuid
        payment_date:
          type: string
          format: date-time
          nullable: true
          description: Data do pagamento. Padrão — hoje.
        amount:
          type: number
          format: double
          nullable: true
          description: Valor a pagar. Padrão — valor total da fatura.

    # ── TRANSFER ─────────────────────────────

    TransferRequest:
      type: object
      required: [origin_wallet_id, destination_wallet_id, amount, date]
      properties:
        origin_wallet_id:
          type: string
          format: uuid
        destination_wallet_id:
          type: string
          format: uuid
        amount:
          type: number
          format: double
          minimum: 0.01
          example: 500.00
        date:
          type: string
          format: date
          example: "2024-01-15"
        description:
          type: string
          example: "Transferência reserva"
        is_paid:
          type: boolean
          default: false

    TransferResponse:
      type: object
      properties:
        pair_id:
          type: string
          format: uuid
          description: UUID que vincula as duas movimentações da transferência
        origin_movement:
          $ref: "#/components/schemas/MovementOutput"
        destination_movement:
          $ref: "#/components/schemas/MovementOutput"

    # ── ESTIMATE ─────────────────────────────

    EstimateCategoryInput:
      type: object
