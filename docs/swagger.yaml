        closing_day:
          type: integer
          minimum: 1
          maximum: 31
          example: 10
        due_day:
          type: integer
          minimum: 1
          maximum: 31
          example: 17
        color:
          type: string
          example: "#820AD1"
        default_wallet_id:
          type: string
          format: uuid
