          items:
            $ref: "#/components/schemas/UserConsentResponse"
        wallets:
          type: array
          items:
            $ref: "#/components/schemas/WalletOutput"
        categories:
          type: array
          items:
            $ref: "#/components/schemas/CategoryOutput"
        sub_categories:
          type: array
          items:
            $ref: "#/components/schemas/SubCategoryOutput"
        movements:
          type: array
          items:
            $ref: "#/components/schemas/MovementOutput"
        credit_cards:
          type: array
          items:
            $ref: "#/components/schemas/CreditCardOutput"
        invoices:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceOutput"
        estimates:
          type: object
          properties:
            categories:
              type: array
              items:
                $ref: "#/components/schemas/EstimateCategories"
            sub_categories:
              type: array
              items:
                $ref: "#/components/schemas/EstimateSubCategories"

    # ── DEVICES ──────────────────────────────

    DeviceRequest:
      type: object
      required: [expo_push_token, platform]
      properties:
        expo_push_token:
          type: string
          description: Token de push do Expo
          example: "ExponentPushToken[xxxxxxxxxxxxxxxxxxxx]"
        platform:
          type: string
          description: Plataforma do dispositivo
          enum: [ios, android]
          example: "ios"

    DeviceResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        expo_push_token:
          type: string
          example: "ExponentPushToken[xxxxxxxxxxxxxxxxxxxx]"
        platform:
          type: string
          example: "ios"
        date_create:
          type: string
          format: date-time
        date_update:
          type: string
          format: date-time
        last_seen_at:
          type: string
          format: date-time
          nullable: true

    # ── AGENT ────────────────────────────────

    AgentChatRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          description: Mensagem do usuário para o agente
          example: "Quanto gastei em alimentação este mês?"
        conversation_id:
          type: string
          format: uuid
          nullable: true
          description: ID da conversa existente. Omitir para iniciar nova conversa.

    AgentChatResponse:
      type: object
      properties:
        conversation_id:
          type: string
          format: uuid
        response:
          type: string
          example: "Você gastou R$ 1.234,56 em alimentação este mês."

    AgentMessage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        conversation_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, assistant]
          example: "user"
        content:
          type: string
          example: "Quanto gastei em alimentação este mês?"
        created_at:
          type: string
          format: date-time

    AgentConversation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
        title:
          type: string
          nullable: true
          example: "Gastos de alimentação"
        messages:
          type: array
          items:
            $ref: "#/components/schemas/AgentMessage"
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time

    AgentMemory:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
        memory_type:
          type: string
          enum: [goal, fact, constraint, insight, commitment, risk_profile, life_event]
          example: "goal"
        content:
          type: string
          example: "Quero economizar R$ 500 por mês"
        metadata:
          type: object
          additionalProperties: true
          nullable: true
        source:
          type: string
          enum: [explicit, elicited, derived]
          example: "explicit"
        confidence:
          type: string
          example: "high"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_validated:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
          nullable: true

    AgentSaveMemoryRequest:
      type: object
      required: [memory_type, content]
      properties:
        memory_type:
          type: string
          enum: [goal, fact, constraint, insight, commitment, risk_profile, life_event]
          example: "goal"
        content:
          type: string
          example: "Quero economizar R$ 500 por mês"
        metadata:
          type: object
          additionalProperties: true
          nullable: true

    AgentUpdateMemoryRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          example: "Quero economizar R$ 800 por mês"
        metadata:
          type: object
          additionalProperties: true
          nullable: true

    AgentPurgeResponse:
      type: object
      properties:
        deleted:
          type: integer
          description: Quantidade de registros purgados
          example: 5
