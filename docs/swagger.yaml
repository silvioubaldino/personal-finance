          example: "Janeiro 2024"
        credit_card:
          $ref: "#/components/schemas/InvoiceCreditCardSummary"
        period_start:
          type: string
          format: date-time
        period_end:
          type: string
          format: date-time
        due_date:
          type: string
          format: date-time
        payment_date:
          type: string
          format: date-time
          nullable: true
        amount:
          type: number
          format: double
        is_paid:
          type: boolean
        wallet:
          $ref: "#/components/schemas/InvoiceWalletSummary"
          nullable: true
        date_update:
          type: string
          format: date-time

    DetailedInvoiceOutput:
      allOf:
        - $ref: "#/components/schemas/InvoiceOutput"
