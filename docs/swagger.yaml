      summary: Preview de desconto do cupom
      description: |
        Valida o cupom para o plano informado sem criar nenhuma redemption.
        Retorna `valid: false` com a razão em caso de falha (cupom inativo, expirado,
        limite atingido, plano não aplicável, etc.) — não retorna erro HTTP nesses casos.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CouponPreviewRequest"
      responses:
        "200":
          description: Resultado da validação do cupom
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CouponPreviewResponse"
              examples:
                valid:
                  summary: Cupom válido
                  value:
                    valid: true
                    original_price: 49.90
                    discounted_price: 39.92
                    currency: "BRL"
                invalid_inactive:
                  summary: Cupom inativo
                  value:
                    valid: false
                    reason: "coupon is not active"
                    original_price: 49.90
                    currency: "BRL"
                not_found:
                  summary: Cupom não encontrado
                  value:
                    valid: false
                    reason: "coupon not found"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

